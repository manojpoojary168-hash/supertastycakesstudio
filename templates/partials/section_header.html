<div class="section-header {% if wide %}section-header--wide{% endif %}">
    {% if eyebrow %}<span class="section-eyebrow">{{ eyebrow }}</span>{% endif %}
    <h2 class="section-title">{{ title }}</h2>
    {% if subtitle %}<p class="section-subtitle">{{ subtitle }}</p>{% endif %}
    <div class="section-divider"><i class="bi bi-diamond-fill"></i></div>
    {% if sample %}<span class="sample-badge">{{ sample }}</span>{% endif %}
</div>
